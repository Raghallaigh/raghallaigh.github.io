<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>51st ODST Expeditionary Force - ORBAT</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Oswald:wght@300;400;700&display=swap" rel="stylesheet" />

    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Oswald', sans-serif;
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ===== BRANDING ===== */
        .brand-color {
            color: #f1c232;
        }

        .brand-border {
            border-bottom: 3px solid #f1c232;
            padding-bottom: 0.5rem;
        }

        h1,
        h2,
        h3,
        h4,
        .orbat-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        h1 {
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 0 20px rgba(241, 194, 50, 0.2);
            margin-bottom: 0.25rem;
        }

        h2 {
            font-size: 1.75rem;
            color: #fff;
            margin: 2rem 0 1rem 0;
        }

        .subtitle {
            font-weight: 300;
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 2rem;
            letter-spacing: 0.1em;
        }

        /* ===== STATS BAR ===== */
        .stats-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem 3rem;
            background: #1e1e1e;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin: 1.5rem 0;
            border-left: 4px solid #f1c232;
        }

        .stats-bar .stat-item {
            font-size: 0.9rem;
        }

        .stats-bar .stat-item span {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: #f1c232;
            font-size: 1.1rem;
        }

        /* ===== ORBAT TREE (flex-based) ===== */
        .orbat-tree {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 2rem 0 2rem 1rem;
            overflow-x: auto;
        }

        .tree-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: auto;
        }

        /* ---- Element card ---- */
        .tree-node .element-item {
            background: #222;
            border: 2px solid #f1c232;
            border-radius: 6px;
            padding: 0.5rem 1.2rem;
            margin: 0.3rem 0;
            display: inline-block;
            text-align: center;
            min-width: 120px;
            position: relative;
            z-index: 2;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .tree-node .element-item .element-name {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            color: #fff;
            text-transform: uppercase;
            display: block;
        }

        .tree-node .element-item .element-type {
            font-size: 0.6rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* ---- Billet list ---- */
        .billet-list {
            list-style: none;
            padding: 0.3rem 0 0.5rem 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.1rem;
            font-size: 0.75rem;
            width: auto;
        }

        .billet-item {
            display: flex;
            align-items: center;
            padding: 0.05rem 0.4rem;
            border-radius: 3px;
            width: auto;
            gap: 0.5rem;
        }

        .billet-item:nth-child(even) {
            background-color: #262626;
        }

        .billet-item.filled {
            color: #ccc;
        }

        .billet-item.empty {
            color: #555;
            font-style: italic;
        }

        .billet-role {
            font-weight: 600;
            color: #888;
            width: 100px;
            text-align: right;
            margin-right: 0.6rem;
            flex-shrink: 0;
            font-size: 0.65rem;
            text-transform: uppercase;
        }

        .billet-rankname {
            color: #f1c232;
            width: 120px;
            font-weight: 600;
            font-size: 0.7rem;
        }

        .billet-rankname .name {
            color: #e0e0e0;
            font-weight: 400;
        }

        .billet-status {
            color: #555;
            width: 100px;
            font-size: 0.65rem;
            font-style: italic;
        }

        /* ---- Children container (horizontal) ---- */
        .tree-node .children {
            display: flex;
            flex-direction: row;
            justify-content: center;
            flex-wrap: nowrap;
            gap: 2rem 3rem;
            position: relative;
            margin-top: 1.5rem;
            padding: 1.5rem 2rem 0 2rem;
            min-width: max-content;
        }

        /* vertical connector from parent to children row */
        .tree-node .children::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 1.5rem;
            background: #f1c232;
            transform: translateX(-50%);
        }

        /* horizontal connector bar */
        .tree-node .children::after {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            width: 80%;
            height: 2px;
            background: #f1c232;
        }

        /* vertical connector from horizontal bar down to each child */
        .tree-node .children>.tree-node::before {
            content: '';
            position: absolute;
            top: -1.5rem;
            left: 50%;
            width: 2px;
            height: 1.5rem;
            background: #f1c232;
        }

        /* ===== ROSTER TABLE ===== */
        .table-wrap {
            overflow-x: auto;
            margin: 1.5rem 0;
            background: #1e1e1e;
            border-radius: 8px;
            padding: 0.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Oswald', sans-serif;
            font-size: 0.9rem;
        }

        th {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #fff;
            text-align: left;
            padding: 0.75rem 0.5rem;
            border-bottom: 2px solid #f1c232;
        }

        td {
            padding: 0.5rem;
            border-bottom: 1px solid #2a2a2a;
        }

        table tbody tr:nth-child(even) td {
            background-color: #262626;
        }

        table tbody tr:hover td {
            background-color: #bf9000;
        }

        .rank-badge {
            color: #f1c232;
            font-weight: 600;
        }

        .status-active {
            color: #6fcf97;
        }
        .status-loa {
            color: #f2c94a;
        }
        .status-reserve {
            color: #888;
        }
        .status-inactive {
            color: #eb5757;
        }

        /* ===== LOADING / EMPTY ===== */
        .loading {
            text-align: center;
            padding: 4rem 0;
            color: #888;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 0;
            color: #666;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .tree-node .children {
                flex-direction: column;
                gap: 0.5rem;
                margin-top: 0.5rem;
                padding: 0.5rem 0 0 0;
                min-width: unset;
            }

            .tree-node .children::before,
            .tree-node .children::after,
            .tree-node .children>.tree-node::before {
                display: none;
            }

            .stats-bar {
                flex-direction: column;
                gap: 0.5rem;
            }

            table {
                font-size: 0.75rem;
            }
            th,
            td {
                padding: 0.3rem;
            }
        }

        /* ===== PRINT ===== */
        @media print {
            body {
                background: #fff;
                color: #000;
                padding: 0.5in;
            }

            .brand-color {
                color: #b38f2a;
            }

            .tree-node .element-item {
                background: #f5f5f5;
                border-color: #b38f2a !important;
            }

            .tree-node .children::before,
            .tree-node .children::after,
            .tree-node .children>.tree-node::before {
                background: #b38f2a;
            }

            .stats-bar {
                background: #f5f5f5;
                border-left-color: #b38f2a;
            }

            .table-wrap {
                background: #f5f5f5;
            }

            th {
                color: #b38f2a;
                border-bottom-color: #b38f2a;
            }

            .rank-badge,
            .billet-rankname {
                color: #b38f2a;
            }

            .stats-bar .stat-item span {
                color: #b38f2a;
            }

            .billet-item:nth-child(even) {
                background-color: transparent !important;
            }
            table tbody tr:nth-child(even) td {
                background-color: transparent !important;
            }
            table tbody tr:hover td {
                background-color: transparent !important;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="app">

        <!-- HEADER -->
        <header>
            <h1>51st ODST Expeditionary Force</h1>
            <p class="subtitle">Organizational Chart &amp; Unit Structure — <span id="last-updated">loading…</span></p>
        </header>

        <!-- STATS BAR -->
        <div class="stats-bar" id="stats-bar">
            <div class="stat-item">Total Personnel: <span id="stat-total">0</span></div>
            <div class="stat-item">Active: <span id="stat-active">0</span></div>
            <div class="stat-item">Squads: <span id="stat-squads">0</span></div>
            <div class="stat-item">Detachments: <span id="stat-detachments">0</span></div>
        </div>

        <!-- ORBAT VIEW -->
        <section>
            <h2>ORBAT</h2>
            <div id="orbat-container">
                <div class="loading">Loading ORBAT data…</div>
            </div>
        </section>

        <!-- ROSTER VIEW -->
        <section>
            <h2>Personnel Roster</h2>
            <div class="table-wrap" id="roster-container">
                <div class="loading">Loading roster…</div>
            </div>
        </section>

    </div>

    <script>
        // ============================================================
        //  STATIC BILLET TEMPLATES (UI logic, not data)
        // ============================================================
        const BILLET_TEMPLATES = {
            squad: ['SL', 'ASL', 'RTO', 'ODST', 'ODST', 'ODST', 'ODST', 'ODST', 'ODST', 'Corpsman', 'Corpsman'],
            'detachment-child': ['Lead', '2IC', 'Member', 'Member', 'Member', 'Member'],
            'air-detachment': ['Flight Lead', 'Flight 2IC', 'Aviator', 'Aviator'],
            'ground-detachment': ['Section Commander', 'Sr Engineer', 'Engineer', 'Engineer'],
            'qrf-detachment': ['SL', 'ASL', 'Corpsman', 'Corpsman', 'Medic ODST', 'Medic ODST'],
            'detachment-command': ['Command'],
            platoon: ['Command', '2IC', 'RTO', 'Corpsman'],
            command: ['CO', 'XO', 'NCOIC', 'Adjutant'],
            templar: ['Templar Actual', 'Templar', 'Templar', 'Templar', 'Templar']
        };

        const SQUAD_COLOURS = {
            'Shadow': '#6aa84f',
            'Hellsing': '#3d85c6',
            'Nightfall': '#cc0000',
            'Chimera': '#6aa84f',
            'Medusa': '#3d85c6',
            'Basilisk': '#cc0000',
            'Dawnbreaker': '#674ea7'
        };

        const SORT_ORDER = [
            'Templar',
            'Vanguard Company',
            'Overlord',
            'Shadow',
            'Hellsing',
            'Nightfall',
            'Dawnbreaker',
            'Cerberus',
            'Chimera',
            'Medusa',
            'Basilisk',
            'Phantom',
            'Phantom-1',
            'Phantom-2',
            'Phoenix',
            'Phoenix-1',
            'Phoenix-2',
            'Talon',
            'Talon-1',
            'Talon-2'
        ];

        const orderMap = {};
        SORT_ORDER.forEach((name, index) => orderMap[name] = index);

        // ============================================================
        //  GLOBAL DATA VARIABLES (populated from JSON)
        // ============================================================
        let RANKS = [];
        let ELEMENTS = [];
        let PERSONNEL = [];

        // ============================================================
        //  HELPERS
        // ============================================================

        function getRank(id) {
            return RANKS.find(r => r.id === id) || { abbreviation: '??', fullName: 'Unknown', order: 999 };
        }

        function getElement(id) {
            return ELEMENTS.find(e => e.id === id);
        }

        function getPersonnel(elementId) {
            return PERSONNEL.filter(p => p.elementId === elementId);
        }

        function getPersonnelByRole(elementId) {
            const grouped = {};
            PERSONNEL.filter(p => p.elementId === elementId).forEach(p => {
                const role = p.role || 'ODST';
                if (!grouped[role]) grouped[role] = [];
                grouped[role].push(p);
            });
            return grouped;
        }

        function getTemplateKey(el) {
            if (el.templateKey) return el.templateKey;
            if (el.type === 'detachment-command') {
                return 'detachment-command';
            }
            if (el.type === 'detachment' || el.type === 'detachment-child') {
                const parent = ELEMENTS.find(e => e.id === el.parentId);
                if (parent) {
                    if (parent.name === 'Phantom') return 'air-detachment';
                    if (parent.name === 'Phoenix') return 'ground-detachment';
                    if (parent.name === 'Talon') return 'qrf-detachment';
                }
                return 'detachment-child';
            }
            return el.type;
        }

        function statusClass(status) {
            const map = { active: 'status-active', loa: 'status-loa', reserve: 'status-reserve' };
            return map[status] || 'status-inactive';
        }

        function statusLabel(status) {
            const map = { active: 'Active', loa: 'LOA', reserve: 'Reserve' };
            return map[status] || 'Inactive';
        }

        function formatDisplayName(first, last) {
            const initial = first && first.length > 0 ? first.charAt(0) : '';
            return initial ? `${initial}. ${last}` : last;
        }

        // ============================================================
        //  ROSTER SORTING LOGIC
        // ============================================================

        // Build a map of element name to its order index (from SORT_ORDER)
        function getElementOrderIndex(el) {
            if (!el) return 9999;
            return orderMap[el.name] ?? 9999;
        }

        // Build a map of element ID to its billet template array (role order)
        function getTemplateForElement(el) {
            const key = getTemplateKey(el);
            return BILLET_TEMPLATES[key] || [];
        }

        // Get the role index for a given personnel item within its element's template
        function getRoleIndex(p, el) {
            const template = getTemplateForElement(el);
            const role = p.role || 'ODST';
            const idx = template.indexOf(role);
            return idx === -1 ? 9999 : idx;
        }

        // Sort personnel: first by element order, then by role order, then by rank order descending
        function sortPersonnel(a, b) {
            const elA = getElement(a.elementId);
            const elB = getElement(b.elementId);
            const orderA = getElementOrderIndex(elA);
            const orderB = getElementOrderIndex(elB);
            if (orderA !== orderB) return orderA - orderB;

            // Same element – sort by role order
            const roleIdxA = getRoleIndex(a, elA);
            const roleIdxB = getRoleIndex(b, elB);
            if (roleIdxA !== roleIdxB) return roleIdxA - roleIdxB;

            // Same role – sort by rank order descending (higher rank first)
            const rankA = getRank(a.rankId);
            const rankB = getRank(b.rankId);
            return (rankB.order || 999) - (rankA.order || 999);
        }

        // ============================================================
        //  RENDER FUNCTIONS
        // ============================================================

        function renderElement(el) {
            const grouped = getPersonnelByRole(el.id);
            const templateKey = getTemplateKey(el);
            const template = BILLET_TEMPLATES[templateKey] || ['Member'];

            let borderColor = '#f1c232';
            if (el.type === 'squad' && SQUAD_COLOURS[el.name]) {
                borderColor = SQUAD_COLOURS[el.name];
            }

            let html = `<div class="tree-node">`;

            html += `<div class="element-item" style="border-color: ${borderColor};">`;
            html += `<span class="element-name">${el.name}</span>`;
            html += `<span class="element-type">${el.type}</span>`;
            html += `</div>`;

            if (template.length > 0) {
                html += `<ul class="billet-list">`;
                
                const roleIndex = {};
                
                template.forEach(role => {
                    const assigned = grouped[role] || [];
                    if (!roleIndex[role]) roleIndex[role] = 0;
                    
                    if (roleIndex[role] < assigned.length) {
                        const p = assigned[roleIndex[role]];
                        const rank = getRank(p.rankId);
                        const displayName = formatDisplayName(p.firstName, p.lastName);
                        const rankName = `${rank.abbreviation}. ${displayName}`;
                        html += `<li class="billet-item filled">
                                    <span class="billet-role">${role}</span>
                                    <span class="billet-rankname">${rankName}</span>
                                </li>`;
                        roleIndex[role]++;
                    } else {
                        html += `<li class="billet-item empty">
                                    <span class="billet-role">${role}</span>
                                    <span class="billet-status">OPEN</span>
                                </li>`;
                    }
                });
                
                html += `</ul>`;
            }

            let children = ELEMENTS.filter(e => e.parentId === el.id);

            children.sort((a, b) => (orderMap[a.name] ?? 999) - (orderMap[b.name] ?? 999));

            if (children.length > 0) {
                html += `<div class="children">`;
                children.forEach(child => {
                    html += renderElement(child);
                });
                html += `</div>`;
            }

            html += `</div>`;
            return html;
        }

        function renderRoster() {
            // Sort personnel using the custom sort function
            const sorted = [...PERSONNEL].sort(sortPersonnel);

            let html = `<table>
                            <thead>
                                <tr>
                                    <th>Rank</th>
                                    <th>Name</th>
                                    <th>Status</th>
                                    <th>Unit</th>
                                    <th>Role</th>
                                </tr>
                            </thead>
                            <tbody>`;

            sorted.forEach(p => {
                const rank = getRank(p.rankId);
                const el = getElement(p.elementId);
                const sClass = statusClass(p.status);
                const displayName = formatDisplayName(p.firstName, p.lastName);
                html += `<tr>
                            <td><span class="rank-badge">${rank.abbreviation}</span></td>
                            <td>${displayName}</td>
                            <td class="${sClass}">${statusLabel(p.status)}</td>
                            <td>${el ? el.name : '—'}</td>
                            <td>${p.role || 'ODST'}</td>
                        </tr>`;
            });

            html += `</tbody></table>`;
            return html;
        }

        function updateStats() {
            const total = PERSONNEL.length;
            const active = PERSONNEL.filter(p => p.status === 'active').length;
            const squads = ELEMENTS.filter(e => e.type === 'squad').length;
            const detachments = ELEMENTS.filter(e => e.type === 'detachment-command' || e.type === 'detachment').length;

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-active').textContent = active;
            document.getElementById('stat-squads').textContent = squads;
            document.getElementById('stat-detachments').textContent = detachments;
            document.getElementById('last-updated').textContent = new Date().toLocaleString();
        }

        function render() {
            const container = document.getElementById('orbat-container');
            let roots = ELEMENTS.filter(e => e.parentId === null);

            roots.sort((a, b) => (orderMap[a.name] ?? 999) - (orderMap[b.name] ?? 999));

            if (roots.length === 0) {
                container.innerHTML = `<div class="empty-state">No ORBAT data available.</div>`;
            } else {
                let html = `<div class="orbat-tree">`;
                roots.forEach(root => {
                    html += renderElement(root);
                });
                html += `</div>`;
                container.innerHTML = html;
            }

            document.getElementById('roster-container').innerHTML = renderRoster();
            updateStats();
        }

        // ============================================================
        //  LOAD DATA FROM JSON (files are in the "data/" folder)
        // ============================================================

        async function loadData() {
            try {
                const [ranksRes, elementsRes, personnelRes] = await Promise.all([
                    fetch('data/ranks.json'),
                    fetch('data/elements.json'),
                    fetch('data/personnel.json')
                ]);

                if (!ranksRes.ok || !elementsRes.ok || !personnelRes.ok) {
                    throw new Error('One or more JSON files could not be loaded.');
                }

                RANKS = await ranksRes.json();
                ELEMENTS = await elementsRes.json();
                PERSONNEL = await personnelRes.json();

                render();
            } catch (error) {
                console.error('Error loading ORBAT data:', error);
                document.getElementById('orbat-container').innerHTML =
                    `<div class="empty-state">⚠️ Failed to load data. Please check console.</div>`;
                document.getElementById('roster-container').innerHTML =
                    `<div class="empty-state">⚠️ Data unavailable.</div>`;
                document.getElementById('last-updated').textContent = 'Error';
            }
        }

        // ============================================================
        //  INIT
        // ============================================================

        document.addEventListener('DOMContentLoaded', loadData);
    </script>

</body>
</html>
